name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/rme_core"
      - name: Run Rust tests
        run: cargo test --manifest-path crates/rme_core/Cargo.toml --verbose
      - name: Run clippy
        run: cargo clippy --manifest-path crates/rme_core/Cargo.toml -- -D warnings
      - name: Check formatting
        run: cargo fmt --manifest-path crates/rme_core/Cargo.toml -- --check

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: rust-tests
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1

      - name: Install maturin and deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          pip install -e ".[dev]"

      - name: Build Rust core
        run: |
          maturin build --release --out dist
          python -m pip install --force-reinstall dist/*.whl

      - name: Lint with ruff
        run: ruff check pyrme/

      - name: Type check with mypy
        run: mypy pyrme/ --ignore-missing-imports

      - name: Run Python tests
        run: pytest tests/python/ -v --tb=short
