name: Jules Maintenance

on:
  workflow_dispatch:
    inputs:
      additional_context:
        description: 'Extra context for the maintenance run'
        type: string
        required: false
        default: ''
      starting_branch:
        description: 'Optional branch override'
        type: string
        required: false
        default: ''

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

jobs:
  invoke:
    uses: './.github/workflows/jules-invoke.yml'
    secrets: 'inherit'
    with:
      additional_context: |-
        focus=maintenance
        scheduled=true
        ${{ github.event.inputs.additional_context || '' }}
      focus: 'maintenance'
      include_commit_log: true
      include_last_commit: false
      starting_branch: '${{ github.event.inputs.starting_branch || github.event.repository.default_branch }}'
