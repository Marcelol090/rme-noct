name: Jules System

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      additional_context:
        description: 'Extra context for the system run'
        type: string
        required: false
        default: ''
      starting_branch:
        description: 'Optional branch override'
        type: string
        required: false
        default: ''

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

jobs:
  invoke:
    uses: './.github/workflows/jules-invoke.yml'
    secrets: 'inherit'
    with:
      additional_context: |-
        focus=system
        scheduled=${{ github.event_name == 'schedule' }}
        ${{ github.event.inputs.additional_context || '' }}
      focus: 'system'
      include_commit_log: true
      include_last_commit: false
      starting_branch: '${{ github.event.inputs.starting_branch || github.event.repository.default_branch }}'
