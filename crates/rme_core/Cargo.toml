[package]
name = "rme_core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "High-performance Rust core for PyRME – Remere's Map Editor"

[lib]
name = "rme_core"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module", "abi3-py312"] }
fnv = "1.0"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
memmap2 = "0.9.10"

# wgpu will be added in Milestone 4 (Canvas Renderer)
# wgpu = "23.0"

[dev-dependencies]
criterion = "0.8.2"
pyo3 = { version = "0.23", features = ["auto-initialize", "abi3-py312"] }
tempfile = "3.8"

[features]
default = []

[[bench]]
name = "io_bench"
harness = false
